<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Failed</title>
  <style>
    /* ธีมเดิมเป๊ะ */
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #6dd5fa, #2980b9); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    .card { 
      background: white; 
      padding: 40px; 
      border-radius: 20px; 
      text-align: center; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
      max-width: 400px; 
      width: 90%; 
    }

    /* --- ส่วนวาดกากบาทแดงด้วย CSS (ไม่ง้อรูป) --- */
    .icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
    }
    
    .red-x {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    .red-x:before, .red-x:after {
      content: '';
      position: absolute;
      width: 80px; /* ความยาวแขน */
      height: 10px; /* ความหนา */
      background-color: #ef4444; /* สีแดง */
      border-radius: 5px;
      top: 35px; /* จัดกลางแนวตั้ง */
      left: 0;
    }
    
    .red-x:before {
      transform: rotate(45deg);
    }
    
    .red-x:after {
      transform: rotate(-45deg);
    }
    /* -------------------------------------- */

    h2 { color: #1e3a8a; margin-top: 10px; }
    p { color: #64748b; font-size: 16px; line-height: 1.6; }
    
    button { 
      background: #2563eb; 
      color: white; 
      border: none; 
      padding: 12px 25px; 
      border-radius: 10px; 
      cursor: pointer; 
      margin-top: 25px; 
      width: 100%; 
      font-size: 16px; 
      transition: 0.3s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <div class="red-x"></div>
    </div>
    <h2>จองไม่สำเร็จ!</h2>
    <p>ขออภัยครับ ห้องพักในช่วงเวลาดังกล่าวถูกจองเต็มแล้ว หรือมีข้อผิดพลาดบางอย่าง กรุณาลองใหม่อีกครั้ง</p>
    <button onclick="window.location.href='index.html'">กลับไปหน้าหลัก</button>
  </div>
</body>
</html>
