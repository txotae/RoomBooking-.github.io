<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Failed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6dd5fa, #2980b9);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .logo {
      width: 100px;
      margin-bottom: 15px;
    }
    .loader {
      border: 6px solid #eee;
      border-top: 6px solid #ef4444;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      color: #1e3a8a;
      margin-top: 10px;
    }
    .error-icon {
      font-size: 60px;
      color: red;
    }
    button {
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">

    <div id="loading">
      <div class="loader"></div>
      <h2>กำลังตรวจสอบ...</h2>
    </div>

    <div id="error-display" style="display:none;">
      <div class="error-icon">✖</div>
      <h2>จองไม่สำเร็จ</h2>
      <p style="color: gray;">เกิดข้อผิดพลาดหรือห้องถูกจองไปแล้ว<br>กรุณาลองใหม่อีกครั้ง</p>
    </div>

    <button onclick="window.location.href='index.html'">กลับไปจองใหม่</button>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error-display").style.display = "block";
    }, 1500);
  </script>

</body>
</html>
