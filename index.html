<!DOCTYPE html>
<html>

<head>
  <title>Room Booking</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
    }
  </style>

</head>

<body>
<div class="container">

<h2>KKUIC Room Booking</h2>

<form id="form">

  <label>ชื่อผู้จอง</label><br>
  <input name="name" required><br><br>

  <label>Email</label><br>
  <input type="email" name="email" required><br><br>

  <label>วันที่</label><br>
  <input type="date" name="date" required><br><br>

  <label>ช่วงเวลา</label><br>
  <select name="time" required>
    <option value="Morning">Morning (09:00–12:00)</option>
    <option value="Afternoon">Afternoon (13:00–16:00)</option>
  </select><br><br>

  <label>เลือกห้อง</label>
<select name="room" required>
  <option value="">-- Select Room --</option>
  <option value="Studio (5th Floor)">Studio (5th Floor)</option>
  <option value="Student Lounge (2nd Floor)">Student Lounge (2nd Floor)</option>
  <option value="M301">M301</option>
  <option value="MacBook Room">MacBook Room</option>
</select>

  <label>หมายเหตุ</label><br>
  <textarea name="note"></textarea><br><br>

  <button type="submit">Book</button>

</form>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("PASTE_YOUR_WEBHOOK_URL_HERE", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message);
};
</script>

  </div>
</body>
</body>
</html>
