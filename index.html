<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKUIC Room Booking</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #6dd5fa, #2980b9); margin: 0; padding: 0; }
    .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    .logo { display: block; margin: 0 auto 15px; width: 120px; }
    h2 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
    label { font-weight: bold; color: #333; display: block; margin-top: 12px; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; background: #2563eb; color: white; padding: 14px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">
    <h2>KKUIC Room Booking</h2>
    <form id="bookingForm">
      <label>Name</label>
      <input type="text" name="name" required>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Major</label>
      <input type="text" name="major" required>
      <label>Date</label>
      <input type="date" name="date" required>
      <label>Time</label>
      <select name="time" required>
        <option value="">-- เลือกช่วงเวลา --</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
      </select>
       <div style="font-size: 12px; color: #6c757d; margin-top: 5px; line-height: 1.5;">
  Morning (09.00 AM - 12.00 PM) <br>
  Afternoon (01.00 PM - 04.00 PM)
</div>
      <label>Room</label>
      <select name="room" required>
        <option value="">-- เลือกห้อง --</option>
        <option value="Studio (5 floor)">Studio (5 floor)</option>
        <option value="Student Lounge (2 floor)">Student Lounge (2 floor)</option>
        <option value="M301">M301</option>
        <option value="MacBook Room">MacBook Room</option>
      </select>

      <label>Note</label>
      <textarea name="note"></textarea>
      <button type="submit" id="submitBtn">Book Now</button>
    </form>
  </div>

  <script>
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "⏳ กำลังส่งข้อมูล...";

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch("https://txotae.app.n8n.cloud/webhook/BookingRoom", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        // สำคัญมาก: อ่านเป็น text ก่อนเพื่อดูว่า n8n ส่งอะไรมา
        const resultText = await response.text();
        console.log("n8n Response:", resultText);

        // เช็คว่าในคำตอบมีคำว่า "success" อยู่ตรงไหนก็ได้ไหม
        if (resultText.toLowerCase().includes("success")) {
          window.location.href = "success.html";
        } else {
          window.location.href = "error.html";
        }
        
      } catch (err) {
        console.error("Error:", err);
        window.location.href = "error.html";
      }
    });
  </script>

</body>
</html>
