<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKUIC Room Booking</title>
  <style>
    /* ธีมเดิมของคุณเป๊ะๆ ไม่เปลี่ยนสักบรรทัด */
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #6dd5fa, #2980b9); margin: 0; padding: 0; }
    .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    .logo { display: block; margin: 0 auto 15px; width: 120px; }
    h2 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
    label { font-weight: bold; color: #333; display: block; margin-top: 12px; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
    textarea { resize: vertical; min-height: 80px; }
    small { color: gray; display: block; margin-top: 5px; margin-bottom: 10px; font-size: 12px; }
    button { width: 100%; background: #2563eb; color: white; padding: 14px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">
    <h2>KKUIC Room Booking</h2>
    <form id="bookingForm">
      <label>name</label>
      <input type="text" name="name" required>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>major</label>
      <input type="text" name="major" placeholder="CREATIVE MEDIA TECHNOLOGY (or CMT)" required>
      <label>date</label>
      <input type="date" name="date" required>
      <label>time</label>
      <select name="time" required>
        <option value="">-- เลือกช่วงเวลา --</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
      </select>
      <small>ช่วงเช้า (09.00-12.00)<br>ช่วงบ่าย (13.00-16.00)</small>
      <label>room</label>
      <select name="room" required>
        <option value="">-- เลือกห้อง --</option>
        <option value="Studio (5 floor)">Studio (5 floor)</option>
        <option value="Student Lounge (2 floor)">Student Lounge (2 floor)</option>
        <option value="M301">M301</option>
        <option value="MacBook Room">MacBook Room</option>
      </select>
      <label>note</label>
      <textarea name="note"></textarea>
      <button type="submit" id="submitBtn">Book Now</button>
    </form>
  </div>

  <script>
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      btn.disabled = true;
      btn.innerText = "กำลังดำเนินการ...";

      try {
        // --- ส่วนที่แก้ไข: เปลี่ยนมาเช็คคำตอบจาก n8n แทนการเด้งไป success ทันที ---
        const response = await fetch("https://txotae.app.n8n.cloud/webhook/BookingRoom", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        // รอรับค่า JSON จาก n8n (ที่เราตั้งว่า status: success หรือ error)
        const result = await response.json();

        if (result.status === "success") {
          // ถ้าจองได้จริง (isBooked = false) ไปหน้าติ๊กถูก
          window.location.href = "success.html";
        } else if (result.status === "error") {
          // ถ้าจองไม่ได้/จองซ้ำ (isBooked = true) ไปหน้ากากบาท
          window.location.href = "error.html";
        } else {
          // เผื่อไว้กรณีอื่น ให้ไปหน้า error
          window.location.href = "error.html";
        }
        
      } catch (err) {
        // ถ้าส่งข้อมูลไม่สำเร็จ หรือ n8n มีปัญหา
        console.error("Error:", err);
        window.location.href = "error.html";
      }
    });
  </script>

</body>
</html>
