<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKUIC Room Booking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6dd5fa, #2980b9);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .logo {
      display: block;
      margin: 0 auto 15px;
      width: 120px;
    }

    h2 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      color: #333;
      display: block;
      margin-top: 12px;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    small {
      color: gray;
      display: block;
      margin-top: 5px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    button {
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">

    <h2>KKUIC Room Booking</h2>

    <form id="bookingForm">

      <label>name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>major</label>
      <input type="text" name="major" placeholder="CREATIVE MEDIA TECHNOLOGY (or CMT)" required>

      <label>date</label>
      <input type="date" name="date" required>

      <label>time</label>
      <select name="time" required>
        <option value="">-- เลือกช่วงเวลา --</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
      </select>

      <small>
        ช่วงเช้า (09.00-12.00)<br>
        ช่วงบ่าย (13.00-16.00)
      </small>

      <label>room</label>
      <select name="room" required>
        <option value="">-- เลือกห้อง --</option>
        <option value="Studio (5 floor)">Studio (5 floor)</option>
        <option value="Student Lounge (2 floor)">Student Lounge (2 floor)</option>
        <option value="M301">M301</option>
        <option value="MacBook Room">MacBook Room</option>
      </select>

      <label>note</label>
      <textarea name="note"></textarea>

      <input type="hidden" name="status" value="Pending">

      <button type="submit" id="submitBtn">Book</button>

    </form>
  </div>

  <script>
    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const form = e.target;
      const formData = new FormData(form);
      const submitBtn = document.getElementById("submitBtn");

      // เปลี่ยนสถานะปุ่มเพื่อไม่ให้กดซ้ำระหว่างรอ
      submitBtn.innerText = "Processing...";
      submitBtn.disabled = true;

      try {
        const res = await fetch("https://txotae.app.n8n.cloud/webhook/BookingRoom", {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          throw new Error("Network response was not ok");
        }

        const data = await res.json();

        // ตรวจสอบเงื่อนไขจาก n8n: 
        // n8n ต้องส่งสถานะกลับมา เช่น { "status": "success" } หรือ { "status": "error" }
        if (data.status === "success") {
          window.location.href = "success.html?message=" + encodeURIComponent(data.message || "จองสำเร็จ");
        } else {
          // ถ้าหลังบ้านบอกว่าจองไม่ได้ (เช่น ห้องทับกัน) ให้ไปหน้า error
          window.location.href = "error.html?message=" + encodeURIComponent(data.message || "ห้องถูกจองแล้ว");
        }

      } catch (err) {
        console.error("Error:", err);
        window.location.href = "error.html?message=" + encodeURIComponent("เกิดข้อผิดพลาดในการเชื่อมต่อ");
      } finally {
        // คืนค่าปุ่มหากเกิดข้อผิดพลาดและยังอยู่ที่เดิม
        submitBtn.innerText = "Book";
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
