<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>KKUIC Room Booking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6dd5fa, #2980b9);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    small {
      color: gray;
      display: block;
      margin-top: -10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1f5f8b;
    }

    .logo {
      display: block;
      margin: 0 auto 15px;
      width: 120px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- โลโก้ -->
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">

    <h2>Room Booking (KKUIC)</h2>

    <!-- 🔥 FORM ที่เชื่อม n8n -->
    <form action="https://txotae.app.n8n.cloud/webhook-test/BookingRoom" method="POST">

      <label>ชื่อผู้จอง</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>สาขา</label>
      <input type="text" name="major" placeholder="CREATIVE MEDIA TECHNOLOGY (or CMT)" required>

      <label>วันที่</label>
      <input type="date" name="date" required>

      <label>ช่วงเวลา</label>
      <select name="time" required>
        <option value="">-- เลือกช่วงเวลา --</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
      </select>

      <small>
        ช่วงเช้า (09.00-12.00)<br>
        ช่วงบ่าย (13.00-16.00)
      </small>

      <label>ห้อง</label>
      <select name="room" required>
        <option value="">-- เลือกห้อง --</option>
        <option value="Studio (5 floor)">Studio (5 floor)</option>
        <option value="Student Lounge (2 floor)">Student Lounge (2 floor)</option>
        <option value="M301">M301</option>
        <option value="MacBook Room">MacBook Room</option>
      </select>

      <label>หมายเหตุ</label>
      <textarea name="note"></textarea>

      <button type="submit">Book</button>

    </form>

  </div>

</body>
</html>
