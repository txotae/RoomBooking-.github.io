<!DOCTYPE html>
<html>
<head>
  <title>KKUIC Room Booking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: gray;
      font-size: 14px;
    }

    label {
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    input:focus, select:focus, textarea:focus {
      border: 1px solid #4facfe;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>KKUIC Room Booking</h2>
  <p>Book your room easily in seconds</p>

  <form id="form">

    <label>ชื่อผู้จอง</label>
    <input name="name" placeholder="Your Name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Email" required>

    <label>วันที่</label>
    <input type="date" name="date" required>

    <label>ช่วงเวลา</label>
    <select name="time" required>
      <option value="">Select Time</option>
      <option value="Morning">Morning</option>
      <option value="Afternoon">Afternoon</option>
    </select>

    <label>เลือกห้อง</label>
    <select name="room" required>
      <option value="">-- Select Room --</option>
      <option value="Studio (5th Floor)">Studio (5th Floor)</option>
      <option value="Student Lounge (2nd Floor)">Student Lounge (2nd Floor)</option>
      <option value="M301">M301</option>
      <option value="MacBook Room">MacBook Room</option>
    </select>

    <label>หมายเหตุ</label>
    <textarea name="note" placeholder="Optional"></textarea>

    <button type="submit">Book</button>

  </form>
</div>

<script>
document.getElementById("form").onsubmit = function(e) {
  e.preventDefault();
  window.location.href = "success.html";
};
</script>

</body>
</html>
