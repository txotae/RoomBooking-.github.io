<!DOCTYPE html>
<html lang="th">
<head>

  <div class="card">
    <div class="icon">✔</div>
    <h2>จองสำเร็จ!</h2>

    <button onclick="window.location.href='index.html'">กลับไปหน้าหลัก</button>

</html>
