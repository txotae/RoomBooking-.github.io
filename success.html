<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Result</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6dd5fa, #2980b9);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo {
      display: block;
      margin: 0 auto 15px;
      width: 120px;
    }

    h2 {
      color: #1e3a8a;
      margin-bottom: 20px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    .message {
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="KKUIC Logo - Rainbow + Off white BG.png" class="logo">

    <div id="icon" class="icon">⏳</div>
    <h2 id="title">กำลังโหลด...</h2>
    <div id="message" class="message"></div>

    <button onclick="window.location.href='index.html'">
      กลับไปจองใหม่
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const status = params.get("status");
    const message = params.get("message");

    const icon = document.getElementById("icon");
    const title = document.getElementById("title");
    const msg = document.getElementById("message");

    if (status === "success") {
      icon.innerHTML = "✔️";
      icon.classList.add("success");
      title.innerText = "จองสำเร็จ";
    } else {
      icon.innerHTML = "❌";
      icon.classList.add("error");
      title.innerText = "จองไม่สำเร็จ";
    }

    msg.innerText = message;
  </script>

</body>
</html>
