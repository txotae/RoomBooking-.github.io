<!DOCTYPE html>
<html>
<head>
  <title>Booking Success</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .check {
      width: 80px;
      height: 80px;
      background: #28a745;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      color: white;
      font-size: 40px;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="check">✔</div>

  <h2>Booking Successful</h2>

  <p>
    Your room booking request has been successfully submitted.<br>
    We will notify you once the room availability is confirmed.
  </p>

  <button onclick="window.location.href='index.html'">
    Back to Booking
  </button>
</div>

</body>
</html>
